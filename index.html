<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>财富自由计算器 | FIRE Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container mt-5 mb-5">
        <!-- 标题 -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 id="pageTitle" class="display-6 fw-bold text-center">
                    财富自由计算器
                </h1>
                <p class="text-center text-muted fs-5" id="pageSubtitle"></p>
            </div>
        </div>

        <!-- 输入表单 -->
        <div class="row mb-4">
            <!-- 资产类 -->
            <div class="col-lg-4 mb-3">
                <div class="card h-100 border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">💰 资产与收益</h5>
                    </div>
                    <div class="card-body">
                        <!-- 本金 -->
                        <div class="mb-3">
                            <label for="principal" class="form-label">初始资产</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="principal" 
                                    class="form-control" 
                                    min="0" 
                                    max="999999999" 
                                    value="1000000"
                                    oninput="handleInput()"
                                />
                                <button class="btn btn-outline-secondary" type="button" onclick="incrementPrincipal()">+</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="decrementPrincipal()">-</button>
                            </div>
                            <small class="text-muted" id="principalDisplay">100万</small>
                        </div>

                        <!-- 年化利率 -->
                        <div class="mb-3">
                            <label for="annualInterestRate" class="form-label">年化收益率 (%)</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="annualInterestRate" 
                                    class="form-control" 
                                    min="0" 
                                    max="100" 
                                    step="0.1"
                                    value="7"
                                    oninput="handleInput()"
                                />
                                <span class="input-group-text">%</span>
                                <button class="btn btn-outline-secondary" type="button" onclick="incrementRate()">+</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="decrementRate()">-</button>
                            </div>
                            <small class="text-muted">基金平均7%左右收益率</small>
                        </div>

                        <!-- 稳定年收入 -->
                        <div class="mb-3">
                            <label for="stableIncome" class="form-label">稳定年收入 (退休金/租收)</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="stableIncome" 
                                    class="form-control" 
                                    min="0" 
                                    max="999999999"
                                    value="0"
                                    oninput="handleInput()"
                                />
                                <button class="btn btn-outline-secondary" type="button" onclick="incrementIncome()">+</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="decrementIncome()">-</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 支出类 -->
            <div class="col-lg-4 mb-3">
                <div class="card h-100 border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">🛒 支出与通胀</h5>
                    </div>
                    <div class="card-body">
                        <!-- 年消费 -->
                        <div class="mb-3">
                            <label for="annualExpenses" class="form-label">年消费支出</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="annualExpenses" 
                                    class="form-control" 
                                    min="1" 
                                    max="999999999"
                                    value="500000"
                                    oninput="handleInput()"
                                />
                                <button class="btn btn-outline-secondary" type="button" onclick="incrementExpense()">+</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="decrementExpense()">-</button>
                            </div>
                            <small class="text-muted" id="monthlyExpensesDisplay">月均约0元</small>
                        </div>

                        <!-- 通胀率 -->
                        <div class="mb-3">
                            <label for="inflationRate" class="form-label">年通胀率 (%)</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="inflationRate" 
                                    class="form-control" 
                                    min="0" 
                                    max="100" 
                                    step="0.1"
                                    value="2.5"
                                    oninput="handleInput()"
                                />
                                <span class="input-group-text">%</span>
                                <button class="btn btn-outline-secondary" type="button" onclick="incrementInflation()">+</button>
                                <button class="btn btn-outline-secondary" type="button" onclick="decrementInflation()">-</button>
                            </div>
                            <small class="text-muted">中国通胀率约2-3%</small>
                        </div>

                        <!-- 起始年龄 -->
                        <div class="mb-3">
                            <label for="startYear" class="form-label">当前年龄</label>
                            <div class="input-group">
                                <input 
                                    type="number" 
                                    id="startYear" 
                                    class="form-control" 
                                    min="0" 
                                    max="120"
                                    value="30"
                                    oninput="handleInput()"
                                />
                                <span class="input-group-text">岁</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="col-lg-4 mb-3">
                <div class="card h-100 border-success">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">⚙️ 操作</h5>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <button class="btn btn-success btn-lg mb-2" onclick="calculate()">
                            📊 开始计算
                        </button>
                        <button class="btn btn-secondary btn-lg mb-2" onclick="resetForm()">
                            🔄 重置表单
                        </button>
                        <button class="btn btn-info btn-lg" onclick="loadExample()">
                            📋 加载示例
                        </button>
                        <div class="alert alert-warning mt-3 mb-0" id="errorMessage" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果表格 -->
        <div class="row mb-4" id="resultSection" style="display:none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">📈 计算结果</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped">
                                <thead class="table-dark">
                                    <tr>
                                        <th style="width: 10%">年龄</th>
                                        <th style="width: 25%">年消费</th>
                                        <th style="width: 25%">年利息</th>
                                        <th style="width: 25%">年末本金</th>
                                        <th style="width: 15%">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="resultTable"></tbody>
                            </table>
                        </div>
                        <div id="endMessage" class="alert alert-info mt-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="row mb-4" id="chartSection" style="display:none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">📊 资产变化趋势</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="fireChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 详情展开面板 -->
        <div id="detailPanel" class="row mb-4" style="display:none;">
            <div class="col-12">
                <div class="card bg-light">
                    <div class="card-header">
                        <h6 class="mb-0">💡 详细计算说明</h6>
                    </div>
                    <div class="card-body">
                        <div id="detailContent"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 公众号二维码区域 -->
        <div class="row mt-5">
            <div class="col-12">
                <div class="card border-0 shadow-sm bg-gradient">
                    <div class="card-body text-center py-5">
                        <h5 class="card-title mb-3 text-dark">
                            💬 关注我的公众号
                        </h5>
                        <p class="text-muted mb-4">获取更多投资相关内容和工具</p>
                        <div class="qrcode-container">
                            <img src="images/qrcode.jpg" alt="公众号二维码" class="qrcode-image" />
                        </div>
                        <p class="text-muted mt-4 small">扫一扫关注公众号</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="calculator.js"></script>
    <script src="ui.js"></script>
</body>
</html>
